<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Tic-Tac-Toe | Play Online</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- PeerJS for Online Multiplayer -->
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>

    <style>
        :root {
            --bg-color: #0b0c10;
            --panel-bg: #1f2833;
            --neon-blue: #66fcf1;
            --neon-pink: #ff007f;
            --text-light: #c5c6c7;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--bg-color); color: var(--text-light); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; overflow: hidden; 
        }

        /* --- TITLE --- */
        h1 { font-family: 'Orbitron', sans-serif; font-size: 2.5rem; font-weight: 900; color: white; text-align: center; margin-bottom: 20px; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        h1 span.blue { color: var(--neon-blue); text-shadow: 0 0 20px var(--neon-blue); }
        h1 span.pink { color: var(--neon-pink); text-shadow: 0 0 20px var(--neon-pink); }

        /* --- LOBBY SCREEN --- */
        .lobby-screen { background: var(--panel-bg); padding: 40px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); text-align: center; max-width: 400px; width: 90%; transition: 0.5s; }
        .lobby-screen.hidden { display: none; }
        
        .box { background: rgba(0,0,0,0.3); padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .room-code { font-family: 'Orbitron', sans-serif; font-size: 2.5rem; color: var(--neon-blue); font-weight: 900; letter-spacing: 5px; text-shadow: 0 0 15px var(--neon-blue); margin: 10px 0; }
        
        input { width: 100%; padding: 15px; border-radius: 10px; border: 2px solid #45a29e; background: #0b0c10; color: white; font-size: 1.5rem; text-align: center; font-family: 'Orbitron', sans-serif; font-weight: 700; outline: none; transition: 0.3s; margin-bottom: 10px;}
        input:focus { border-color: var(--neon-pink); box-shadow: 0 0 15px var(--neon-pink); }
        input::placeholder { color: rgba(255,255,255,0.2); font-size: 1rem; font-family: 'Poppins', sans-serif;}

        button { width: 100%; padding: 15px; border-radius: 10px; border: none; font-size: 1.2rem; font-weight: 800; cursor: pointer; transition: 0.3s; text-transform: uppercase; font-family: 'Orbitron', sans-serif;}
        .btn-blue { background: transparent; color: var(--neon-blue); border: 2px solid var(--neon-blue); box-shadow: 0 0 10px rgba(102, 252, 241, 0.2); }
        .btn-blue:active { background: var(--neon-blue); color: #000; box-shadow: 0 0 30px var(--neon-blue); }
        
        .btn-pink { background: var(--neon-pink); color: white; box-shadow: 0 0 15px rgba(255, 0, 127, 0.4); margin-top: 10px;}
        .btn-pink:active { transform: scale(0.95); box-shadow: 0 0 30px var(--neon-pink); }

        /* --- GAME SCREEN --- */
        .game-screen { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 400px; padding: 20px; }
        .game-screen.active { display: flex; animation: fadeIn 0.5s ease; }
        
        .status-board { width: 100%; background: var(--panel-bg); padding: 15px; border-radius: 15px; text-align: center; margin-bottom: 30px; font-size: 1.2rem; font-weight: 600; border: 1px solid rgba(255,255,255,0.05); }
        .status-board span { font-family: 'Orbitron', sans-serif; font-weight: 900; }
        .status-board .my-turn { color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }
        .status-board .their-turn { color: var(--neon-pink); text-shadow: 0 0 10px var(--neon-pink); }

        .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; aspect-ratio: 1/1; background: #45a29e; padding: 10px; border-radius: 15px; box-shadow: 0 0 30px rgba(69, 162, 158, 0.2); }
        .cell { background: var(--bg-color); border-radius: 10px; display: flex; justify-content: center; align-items: center; font-size: 4rem; font-family: 'Orbitron', sans-serif; font-weight: 900; cursor: pointer; transition: 0.2s; }
        .cell:hover { background: #1a1a24; }
        
        .cell.x { color: var(--neon-blue); text-shadow: 0 0 20px var(--neon-blue); animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .cell.o { color: var(--neon-pink); text-shadow: 0 0 20px var(--neon-pink); animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        /* --- ANIMATIONS & EFFECTS --- */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pop { 0% { transform: scale(0); } 80% { transform: scale(1.2); } 100% { transform: scale(1); } }
        
        .particle { position: fixed; width: 10px; height: 10px; border-radius: 50%; pointer-events: none; z-index: 8000; opacity: 0; }
        @keyframes explode { 0% { transform: translate(0,0) scale(1); opacity: 1; } 100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; } }

        /* Loader */
        .loader { display: none; margin-top: 15px; color: var(--neon-blue); font-size: 0.9rem; font-weight: 600; }
        .loader i { animation: spin 1s linear infinite; margin-right: 8px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <h1><span class="blue">NEON</span> <span class="pink">TAC</span> TOE</h1>

    <!-- LOBBY SCREEN -->
    <div class="lobby-screen" id="lobby">
        
        <!-- Host Game -->
        <div class="box">
            <p style="font-size: 0.9rem; color: var(--text-light); margin-bottom: 5px;">Your Room Code</p>
            <div class="room-code" id="my-code">-----</div>
            <p style="font-size: 0.8rem; margin-bottom: 15px;">Share this code with your friend</p>
            <button class="btn-blue" onclick="copyCode()" id="copy-btn"><i class="fa-regular fa-copy"></i> Copy Code</button>
            <div class="loader" id="host-loader"><i class="fa-solid fa-circle-notch"></i> Waiting for friend to join...</div>
        </div>

        <p style="margin: 20px 0; font-weight: 800; opacity: 0.5;">OR</p>

        <!-- Join Game -->
        <div class="box">
            <p style="font-size: 0.9rem; color: var(--text-light); margin-bottom: 10px;">Join a Friend</p>
            <input type="number" id="friend-code" placeholder="Enter 5-Digit Code" maxlength="5">
            <button class="btn-pink" onclick="joinGame()"><i class="fa-solid fa-gamepad"></i> Join Game</button>
            <div class="loader" id="join-loader" style="color: var(--neon-pink);"><i class="fa-solid fa-circle-notch"></i> Connecting...</div>
        </div>

    </div>

    <!-- GAME SCREEN -->
    <div class="game-screen" id="game">
        <div class="status-board" id="status-text">
            Connecting to game...
        </div>

        <div class="board" id="board">
            <div class="cell" onclick="makeMove(0)"></div>
            <div class="cell" onclick="makeMove(1)"></div>
            <div class="cell" onclick="makeMove(2)"></div>
            <div class="cell" onclick="makeMove(3)"></div>
            <div class="cell" onclick="makeMove(4)"></div>
            <div class="cell" onclick="makeMove(5)"></div>
            <div class="cell" onclick="makeMove(6)"></div>
            <div class="cell" onclick="makeMove(7)"></div>
            <div class="cell" onclick="makeMove(8)"></div>
        </div>

        <button class="btn-blue" id="rematch-btn" onclick="requestRematch()" style="margin-top: 30px; display: none;">Play Again</button>
    </div>

    <!-- JAVASCRIPT LOGIC -->
    <script>
        // --- MULTIPLAYER SETUP (WebRTC via PeerJS) ---
        
        // Generate a random 5-digit code for the room
        const myRoomCode = Math.floor(10000 + Math.random() * 90000).toString();
        document.getElementById('my-code').innerText = myRoomCode;

        // Initialize Peer (Creates an online ID using our room code)
        // We add a prefix so our app doesn't collide with other PeerJS apps
        const peerPrefix = "neon-game-super-";
        const peer = new Peer(peerPrefix + myRoomCode);
        
        let connection;
        let mySymbol = ''; // 'X' or 'O'
        let myTurn = false;
        let gameActive = false;
        let boardState = ['', '', '', '', '', '', '', '', ''];

        // If someone connects to us (We are HOST)
        peer.on('connection', (conn) => {
            connection = conn;
            setupConnection();
            
            // Host is always X, goes first
            mySymbol = 'X';
            myTurn = true;
            startGameUI();
        });

        // Copy Code Function
        function copyCode() {
            navigator.clipboard.writeText(myRoomCode);
            const btn = document.getElementById('copy-btn');
            btn.innerHTML = "<i class='fa-solid fa-check'></i> Copied!";
            setTimeout(() => { btn.innerHTML = "<i class='fa-regular fa-copy'></i> Copy Code"; }, 2000);
            
            // Show waiting loader
            document.getElementById('host-loader').style.display = 'block';
        }

        // We join someone else (We are GUEST)
        function joinGame() {
            const friendCode = document.getElementById('friend-code').value;
            if(friendCode.length !== 5) return alert("Please enter a valid 5-digit code.");
            
            document.getElementById('join-loader').style.display = 'block';

            // Connect to their peer ID
            connection = peer.connect(peerPrefix + friendCode);
            
            connection.on('open', () => {
                setupConnection();
                // Guest is always O, goes second
                mySymbol = 'O';
                myTurn = false;
                startGameUI();
            });

            connection.on('error', () => {
                alert("Could not find that room. Make sure the code is correct!");
                document.getElementById('join-loader').style.display = 'none';
            });
        }

        // --- GAME LOGIC ---

        function setupConnection() {
            // What to do when we receive data from our friend
            connection.on('data', (data) => {
                if(data.type === 'move') {
                    receiveMove(data.index, data.symbol);
                }
                if(data.type === 'rematch') {
                    resetBoard(false); // False because we didn't initiate it
                }
            });

            // Handle friend disconnecting
            connection.on('close', () => {
                alert("Your friend disconnected!");
                location.reload(); // Refresh page
            });
        }

        function startGameUI() {
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('game').classList.add('active');
            gameActive = true;
            updateStatusText();
        }

        function updateStatusText() {
            const statusBox = document.getElementById('status-text');
            if(!gameActive) return;

            if(myTurn) {
                statusBox.innerHTML = `Your Turn (<span class="${mySymbol === 'X' ? 'my-turn' : 'their-turn'}">${mySymbol}</span>) - Crush them! 🔥`;
            } else {
                statusBox.innerHTML = `Friend's Turn... Don't panic. 🥶`;
            }
        }

        function makeMove(index) {
            // Check if it's our turn, game is active, and cell is empty
            if(!myTurn || !gameActive || boardState[index] !== '') return;

            // Update our board locally
            boardState[index] = mySymbol;
            renderBoard();

            // Send move to friend
            connection.send({ type: 'move', index: index, symbol: mySymbol });

            // Check Win/Loss
            checkWinState();

            if(gameActive) {
                myTurn = false;
                updateStatusText();
            }
        }

        function receiveMove(index, symbol) {
            boardState[index] = symbol;
            renderBoard();
            
            checkWinState();

            if(gameActive) {
                myTurn = true;
                updateStatusText();
            }
        }

        function renderBoard() {
            const cells = document.querySelectorAll('.cell');
            cells.forEach((cell, i) => {
                cell.innerText = boardState[i];
                cell.className = 'cell'; // reset classes
                if(boardState[i] === 'X') cell.classList.add('x');
                if(boardState[i] === 'O') cell.classList.add('o');
            });
        }

        const winConditions = [
            [0,1,2], [3,4,5], [6,7,8], // Rows
            [0,3,6], [1,4,7], [2,5,8], // Cols
            [0,4,8], [2,4,6]           // Diagonals
        ];

        function checkWinState() {
            let roundWon = false;
            let winningSymbol = '';

            for(let i=0; i < winConditions.length; i++) {
                const [a, b, c] = winConditions[i];
                if(boardState[a] && boardState[a] === boardState[b] && boardState[a] === boardState[c]) {
                    roundWon = true;
                    winningSymbol = boardState[a];
                    break;
                }
            }

            if(roundWon) {
                gameActive = false;
                if(winningSymbol === mySymbol) {
                    document.getElementById('status-text').innerHTML = `<span class="my-turn">YOU WIN! 🏆</span> Outstanding move!`;
                    shootConfetti();
                } else {
                    document.getElementById('status-text').innerHTML = `<span class="their-turn">YOU LOSE! 💀</span> Better luck next time.`;
                }
                document.getElementById('rematch-btn').style.display = 'block';
                return;
            }

            // Check Draw
            if(!boardState.includes('')) {
                gameActive = false;
                document.getElementById('status-text').innerHTML = `It's a DRAW! 🤝 Boring.`;
                document.getElementById('rematch-btn').style.display = 'block';
            }
        }

        // --- REMATCH LOGIC ---

        function requestRematch() {
            // Tell friend we are restarting
            connection.send({ type: 'rematch' });
            resetBoard(true);
        }

        function resetBoard(didInitiate) {
            boardState = ['', '', '', '', '', '', '', '', ''];
            renderBoard();
            gameActive = true;
            document.getElementById('rematch-btn').style.display = 'none';
            
            // Loser/Second person goes first next round to be fair
            // Simplification: If you initiated the restart, you wait.
            myTurn = !didInitiate; 
            updateStatusText();
        }

        // --- FUN CONFETTI EFFECT ---
        function shootConfetti() {
            const colors = ['#66fcf1', '#ff007f', '#FFFFFF'];
            for(let i = 0; i < 50; i++) {
                const p = document.createElement('div');
                p.classList.add('particle');
                p.style.background = colors[Math.floor(Math.random() * colors.length)];
                p.style.top = '50%'; p.style.left = '50%';
                
                const tx = (Math.random() - 0.5) * 600 + 'px';
                const ty = (Math.random() - 0.5) * 600 + 'px';
                p.style.setProperty('--tx', tx);
                p.style.setProperty('--ty', ty);
                p.style.animation = `explode 1.5s cubic-bezier(0.25, 1, 0.5, 1) forwards`;
                
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 1500);
            }
        }
    </script>
</body>
</html>
